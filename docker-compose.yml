services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pdp_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pdp-generator-next
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      AUTH_TRUST_HOST: "true"
      ALLOWED_EMAIL_DOMAIN: ${ALLOWED_EMAIL_DOMAIN}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_DRIVE_PDP_FOLDER_ID: ${GOOGLE_DRIVE_PDP_FOLDER_ID:-}
      OPTIONAL_MEETING_GUEST_EMAIL: ${OPTIONAL_MEETING_GUEST_EMAIL:-}
      CRON_SECRET: ${CRON_SECRET}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Nightly scheduler: hits the secured cron endpoint at 00:05 (container TZ,
  # UTC by default) so the day's "Topic of the day" is ready before anyone logs
  # in. Uses busybox crond; installs curl on start for a reliable auth header.
  cron:
    image: alpine:3
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    environment:
      CRON_SECRET: ${CRON_SECRET}
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl >/dev/null
        echo '5 0 * * * curl -fsS -H "Authorization: Bearer '"$$CRON_SECRET"'" http://app:3000/api/cron/daily-topic >/proc/1/fd/1 2>&1' > /etc/crontabs/root
        crond -f -l 8

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pdp_db_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
